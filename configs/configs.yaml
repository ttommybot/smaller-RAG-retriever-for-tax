project_name: "rag_for_tax"

paths:
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"
  vector_db_dir: "vectordb"

chunking:
  chunk_size: 300
  chunk_overlap: 100
  min_chunk: 100

embedding:
  model_large_name: "BAAI/bge-large-zh-v1.5"
  model_small_name: "sentence-transformers/all-MiniLM-L6-v2"
  model_student_name: "sentence-transformers/all-MiniLM-L6-v2"
  model_teacher_name: "BAAI/bge-reranker-v2-gemma"

retrieval:
  top_k: 5

models:
  generator_backend: "dummy"   # dummy / openai / ollama
  generator_model_name: "gpt-4o-mini"

app:
  show_sources: true

